<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ケバブ祭り〜射的編〜</title>
    <link rel="stylesheet" href="./styles.css?v=layout-1">
  </head>
  <body>
    <main class="app">
      <section class="home-screen view" id="homeScreen" aria-label="ケバブ祭り トップ">
        <div class="home-poster">
          <img id="topImage" src="./assets/top/top-screen.png" alt="ケバブ祭りの射的屋台">
          <div class="poster-fallback" id="posterFallback">
            <p class="series">奇祭</p>
            <h1>ケバブ祭りの<br>射的屋台</h1>
            <p>豪華景品を撃ち落せ</p>
          </div>
          <div class="home-actions" aria-label="トップメニュー">
            <button id="topFreeButton" class="home-hit free" type="button">今日の無料分で遊ぶ</button>
            <button id="topAdButton" class="home-hit adplay" type="button">広告を見て遊ぶ</button>
            <button id="topBookButton" class="home-hit collection" type="button">これまでの獲得景品を見る</button>
            <button id="topOtherButton" class="home-hit other" type="button" disabled>違う屋台で遊ぶ</button>
          </div>
        </div>
      </section>

      <section class="game-shell view" id="gameScreen" aria-label="ケバブ祭り 射的ゲーム" hidden>
        <div class="game-board" id="range">
          <img class="game-base" src="./assets/game/syatekiimage2.png" alt="ケバブ祭りの射的屋台">

          <div class="status-grid internal-status" aria-label="プレイ状況" hidden>
            <div>
              <span>無料分</span>
              <strong id="dailyStatus">確認中</strong>
            </div>
            <div>
              <span>弾</span>
              <strong id="ammoCount">3</strong>
            </div>
            <div>
              <span>カード</span>
              <strong id="collectionCount">0/12</strong>
            </div>
          </div>

          <p id="kebabLine" class="line kebab-line">今日は一発勝負。景品をよく狙って。</p>

          <section class="play-lane" aria-label="景品レーン">
            <div class="hit-zone" id="hitZone" aria-hidden="true"></div>
            <div class="targets" id="targets" aria-label="景品"></div>
            <button class="crosshair" id="crosshair" type="button" aria-label="狙いを撃つ">
              <span></span>
            </button>
          </section>

          <div class="score-strip internal-status" aria-label="射的ステータス" hidden>
            <div class="result-log">
              <b>結果ログ</b>
              <div id="resultLog" aria-live="polite"></div>
            </div>
            <div class="score-box">
              <b>スコア</b>
              <strong id="scoreValue">00000</strong>
            </div>
            <div class="score-box best">
              <b>ベスト</b>
              <strong id="bestValue">00000</strong>
            </div>
          </div>

          <div class="game-actions" aria-label="操作">
            <button id="shootButton" class="image-hotspot shoot-hotspot" type="button">撃つ！</button>
            <button id="adButton" class="image-hotspot ad-hotspot" type="button">広告を見てもう一度遊ぶ</button>
            <button id="bookButton" class="image-hotspot book-hotspot" type="button">獲得景品図鑑</button>
            <button id="homeButton" class="image-hotspot home-hotspot" type="button">トップへ戻る</button>
          </div>

          <div class="hidden-controls" aria-hidden="true" hidden>
            <button id="reloadButton" type="button">リロード</button>
            <button id="playButton" type="button">今日の無料分で遊ぶ</button>
          </div>
        </div>
      </section>

      <aside class="book view" id="book" aria-label="獲得景品一覧" hidden>
        <div class="book-header">
          <h2>獲得景品一覧</h2>
          <div class="book-tools">
            <button id="bookHomeButton" class="text-button" type="button">トップへ</button>
            <button id="bookAudioButton" class="text-button audio-inline" type="button" aria-pressed="false">音 ON</button>
          </div>
        </div>
        <div class="cards" id="cards"></div>
      </aside>
    </main>

    <dialog id="resultDialog">
      <div class="dialog-body">
        <p class="dialog-label" id="dialogLabel">命中</p>
        <h2 id="dialogTitle">カード獲得</h2>
        <div class="reward-card" id="rewardCard"></div>
        <p id="dialogText"></p>
        <form method="dialog">
          <button class="primary" type="submit">閉じる</button>
        </form>
      </div>
    </dialog>

    <dialog id="imageDialog" class="image-dialog">
      <div class="image-dialog-body">
        <div class="image-dialog-bar">
          <strong id="imageDialogTitle">景品</strong>
          <form method="dialog">
            <button class="image-dialog-close" type="submit" aria-label="閉じる">×</button>
          </form>
        </div>
        <img id="imageDialogImage" src="" alt="">
      </div>
    </dialog>

    <dialog id="againDialog">
      <div class="dialog-body again-body">
        <p class="dialog-label">広告</p>
        <h2>広告をチェック</h2>
        <a
          id="againLink"
          class="again-creative-link"
          href="https://today-naru.vercel.app/"
          target="_blank"
          rel="noopener noreferrer"
          style="display:block;width:min(100%,420px);aspect-ratio:1086/1448;"
        >
          <img
            id="againImage"
            src="./assets/again/again-01.png"
            width="1086"
            height="1448"
            alt="広告"
            style="display:block;width:100%;height:100%;object-fit:contain;"
          >
        </a>
        <div class="again-meter" aria-hidden="true"><span id="againMeter"></span></div>
        <p id="againText">広告を視聴しています...</p>
      </div>
    </dialog>

    <button id="audioButton" class="audio-toggle" type="button" aria-pressed="false">音 ON</button>

    <script src="./app.js?v=layout-1"></script>
  </body>
</html>
